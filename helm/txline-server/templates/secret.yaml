{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "txline-server.fullname" . }}-credentials
  labels:
    {{- include "txline-server.labels" . | nindent 4 }}
type: Opaque
data:
  .txline-credentials.json: {{ required "Set credentials.json (base64-encoded) or credentials.existingSecret (name of a pre-existing Secret)" .Values.credentials.json }}
{{- end }}

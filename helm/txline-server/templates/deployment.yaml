apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "txline-server.fullname" . }}
  labels:
    {{- include "txline-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "txline-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "txline-server.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: txline-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: credentials
              mountPath: /app/credentials
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /fixtures
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: credentials
          secret:
            secretName: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" (include "txline-server.fullname" .)) }}

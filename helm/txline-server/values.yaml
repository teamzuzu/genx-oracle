replicaCount: 1

image:
  repository: ghcr.io/OWNER/txline-server  # replace OWNER with your GitHub org or username
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  host: txline.example.com
  # tls:
  #   - secretName: txline-tls
  #     hosts:
  #       - txline.example.com

credentials:
  # Option A — inline JSON (base64-encoded), chart creates the Secret:
  #   --set credentials.json="$(base64 -w0 .txline-credentials.json)"
  json: ""
  # Option B — reference a pre-existing Kubernetes Secret (no JSON needed at install time):
  #   kubectl create secret generic my-txline-secret --from-file=.txline-credentials.json
  #   --set credentials.existingSecret=my-txline-secret
  existingSecret: ""
